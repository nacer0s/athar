name: athar
description: >
  Athar (أثر) — A minimalist offline Focus Timer combined with a
  Micro-Journaling system. Adaptive UI for iOS (Cupertino) and
  Android (Material 3), fully bilingual Arabic/English.
version: 1.0.0+1
publish_to: none


# ─────────────────────────────────────────────────────────────
# SDK constraints
# ─────────────────────────────────────────────────────────────
environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"


# ─────────────────────────────────────────────────────────────
# Runtime Dependencies
# ─────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  provider: ^6.1.5+1

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  flutter_svg: ^2.2.4

  url_launcher: ^6.3.2


# ─────────────────────────────────────────────────────────────
# Dev Dependencies
# ─────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter

  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  analyzer: 6.4.1


# ─────────────────────────────────────────────────────────────
# Flutter Configuration
# ─────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    # ✅ FIX 1: directories need a trailing slash
    # ✅ FIX 2: font files do NOT go in assets — remove that line
    - assets/icons/
    - assets/generated/

  # ✅ FIX 3: font file must physically exist at fonts/ in project root
  #           before this block is active — place the .ttf file first,
  #           then uncomment this entire block
  #
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 100
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 200
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 300
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 400
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 500
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 600
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 700
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 800
  #       - asset: fonts/Cairo-VariableFont_slnt,wght.ttf
  #         weight: 900


# ─────────────────────────────────────────────────────────────
# App Icon
# ─────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/generated/app_icon_lm.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/generated/app_icon_lm.png"
  adaptive_icon_background_dark: "#323232"
  adaptive_icon_foreground_dark: "assets/generated/app_icon_dm.png"
  min_sdk_android: 21


# ─────────────────────────────────────────────────────────────
# Native Splash
# ─────────────────────────────────────────────────────────────
flutter_native_splash:
  color:      "#FFFFFF"
  image:      "assets/generated/app_icon_lm.png"
  color_dark: "#323232"
  image_dark: "assets/generated/app_icon_dm.png"
  fullscreen: true
  android_12:
    image:                      "assets/generated/app_icon_lm.png"
    image_dark:                 "assets/generated/app_icon_dm.png"
    icon_background_color:      "#FFFFFF"
    icon_background_color_dark: "#323232"